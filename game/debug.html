<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomberman - Debug</title>
  <style>
    body {
      font-family: monospace;
      background: #222;
      color: #0f0;
      padding: 20px;
    }
    .log {
      margin: 10px 0;
      padding: 10px;
      background: #111;
      border-left: 3px solid #0f0;
    }
    .error {
      border-left-color: #f00;
      color: #f00;
    }
    .warning {
      border-left-color: #ff0;
      color: #ff0;
    }
    button {
      padding: 10px 20px;
      margin: 10px 0;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #0f8;
    }
    #status {
      padding: 20px;
      margin: 20px 0;
      background: #1a1a1a;
      border: 2px solid #0f0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>🎮 Bomberman Debug Console</h1>
  
  <div id="status">
    <h2>Connection Status</h2>
    <p id="ws-status">WebSocket: <span style="color: #f00">Not tested</span></p>
    <p id="dom-status">DOM: <span style="color: #ff0">Loading...</span></p>
  </div>

  <button onclick="testConnection()">Test WebSocket Connection</button>
  <button onclick="testDOM()">Test DOM</button>
  <button onclick="loadGame()">Load Game</button>
  <button onclick="clearLogs()">Clear Logs</button>

  <h2>Console Output:</h2>
  <div id="logs"></div>

  <script>
    const logsDiv = document.getElementById('logs');

    function log(message, type = 'info') {
      const logEl = document.createElement('div');
      logEl.className = `log ${type}`;
      const timestamp = new Date().toLocaleTimeString();
      logEl.textContent = `[${timestamp}] ${message}`;
      logsDiv.appendChild(logEl);
      logsDiv.scrollTop = logsDiv.scrollHeight;
      console.log(message);
    }

    function testConnection() {
      log('Testing WebSocket connection to ws://localhost:8080...', 'warning');
      const ws = new WebSocket('ws://localhost:8080');
      
      ws.onopen = () => {
        log('✅ WebSocket connected successfully!', 'info');
        document.getElementById('ws-status').innerHTML = 'WebSocket: <span style="color: #0f0">Connected ✅</span>';
        ws.close();
      };
      
      ws.onerror = (error) => {
        log(`❌ WebSocket error: ${error}`, 'error');
        document.getElementById('ws-status').innerHTML = 'WebSocket: <span style="color: #f00">Error ❌</span>';
      };
      
      ws.onclose = () => {
        log('WebSocket closed', 'warning');
      };
    }

    function testDOM() {
      log('Testing DOM elements...', 'warning');
      const appDiv = document.getElementById('app');
      if (appDiv) {
        log('✅ #app div found', 'info');
      } else {
        log('❌ #app div NOT found', 'error');
      }
    }

    function loadGame() {
      log('Loading game page...', 'warning');
      window.location.href = '/';
    }

    function clearLogs() {
      logsDiv.innerHTML = '';
      log('Logs cleared', 'info');
    }

    // Auto-run tests on load
    window.addEventListener('load', () => {
      log('Page loaded', 'info');
      document.getElementById('dom-status').innerHTML = 'DOM: <span style="color: #0f0">Ready ✅</span>';
      testConnection();
    });
  </script>
</body>
</html>
