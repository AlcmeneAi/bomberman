<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bomberman Tile Size Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    .panel {
      padding: 16px;
      border-right: 1px solid #333;
      background: #1a1a1a;
    }
    .panel h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: #ccc;
    }
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #0f0f0f;
      color: #eee;
    }
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #0f0f0f;
      color: #eee;
    }
    .stats {
      margin-top: 16px;
      padding: 10px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
    }
    .canvas-wrap {
      display: grid;
      place-items: center;
      padding: 24px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #333;
      background: #000;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Tile Test</h1>

    <div class="field">
      <label for="spriteName">Bomberman sprite</label>
      <select id="spriteName">
        <option value="player_red.png">Red</option>
        <option value="blue_bomberman.png">Blue</option>
        <option value="pink_bomberman.png">Pink</option>
        <option value="black_bomberman.png">Black</option>
      </select>
    </div>

    <div class="field">
      <label for="tileSize">Tile size (px)</label>
      <input id="tileSize" type="number" min="4" step="1" value="16" />
    </div>

    <div class="field">
      <label for="scale">Sprite scale</label>
      <input id="scale" type="number" min="1" step="1" value="2" />
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="768" height="512"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const spriteNameSelect = document.getElementById('spriteName');
    const tileSizeInput = document.getElementById('tileSize');
    const scaleInput = document.getElementById('scale');
    const stats = document.getElementById('stats');

    const spriteCache = {};

    function getSelectedSprite() {
      const name = spriteNameSelect.value;

      if (!spriteCache[name]) {
        const img = new Image();
        img.src = `./img/${name}`;
        img.onload = render;
        spriteCache[name] = img;
      }

      return spriteCache[name];
    }

    function drawGrid(tileSize) {
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;

      for (let x = 0; x <= canvas.width; x += tileSize) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += tileSize) {
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(canvas.width, y + 0.5);
        ctx.stroke();
      }
    }

    function render() {
      const sprite = getSelectedSprite();
      if (!sprite.complete) return;

      const tileSize = Math.max(4, parseInt(tileSizeInput.value || '16', 10));
      const scale = Math.max(1, parseInt(scaleInput.value || '2', 10));

      const sw = sprite.width;
      const sh = sprite.height;
      const dw = sw * scale;
      const dh = sh * scale;

      const pxPerTileW = (dw / tileSize).toFixed(2);
      const pxPerTileH = (dh / tileSize).toFixed(2);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid(tileSize);

      const startX = tileSize * 4;
      const startY = tileSize * 4;

      // highlight occupied area
      ctx.fillStyle = 'rgba(0, 180, 255, 0.2)';
      ctx.fillRect(startX, startY, dw, dh);

      // draw sprite
      ctx.drawImage(sprite, startX, startY, dw, dh);

      // origin marker
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(startX - 2, startY - 2, 4, 4);

      stats.innerHTML = `
        Selected sprite: <b>${spriteNameSelect.value}</b><br>
        Sprite source size: <b>${sw} x ${sh}</b> px<br>
        Drawn size (with scale ${scale}): <b>${dw} x ${dh}</b> px<br>
        Tile size: <b>${tileSize} x ${tileSize}</b> px<br>
        Occupies: <b>${pxPerTileW}</b> tiles wide x <b>${pxPerTileH}</b> tiles tall
      `;
    }

    getSelectedSprite();
    spriteNameSelect.addEventListener('change', render);
    tileSizeInput.addEventListener('input', render);
    scaleInput.addEventListener('input', render);
  </script>
</body>
</html>
